name: Claude Q&A

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]

jobs:
  claude:
    # Runs only when the repo owner mentions @claude
    if: >-
      contains(github.event.comment.body || github.event.issue.body, '@claude')
      && github.actor == github.repository_owner
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
      pull-requests: read
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
