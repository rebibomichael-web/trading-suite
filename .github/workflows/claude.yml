name: Claude Q&A

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened]

jobs:
  claude:
    # Runs only when the repo owner mentions @claude
    if: >-
      contains(github.event.comment.body || github.event.issue.body, '@claude')
      && github.actor == github.repository_owner
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
      pull-requests: read
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # The stored secret contains a line break from a wrapped-terminal paste
      # (same issue the pipelines strip in code — see commit f90bde7). The
      # action gets the secret raw, so clean it here before handing it over.
      - name: Clean OAuth token
        env:
          RAW_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          TOKEN=$(printf '%s' "$RAW_TOKEN" | tr -d '[:space:]')
          echo "::add-mask::$TOKEN"
          echo "CLEAN_OAUTH_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ env.CLEAN_OAUTH_TOKEN }}
